name: Update Equipment Browser

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

jobs:
  update-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install pandas openpyxl

      - name: Download Excel from OneDrive folder
        run: |
          wget --content-disposition \
          "${{ secrets.ONEDRIVE_EXCEL_URL }}?download=1" \
          -O onedrive.zip
      
          file onedrive.zip
      
          unzip onedrive.zip -d excel_folder
      
          cp $(find excel_folder -name "*.xlsx" | head -1) \
          "IIT-M_L&E_Web&Visit_Data_OG.xlsx"


      - name: Verify Excel
        run: |
          ls -lh "IIT-M_L&E_Web&Visit_Data_OG.xlsx"


      - name: Generate HTML
        run: |
          python regenerate_browser.py


      - name: Commit updated HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add index.html

          git diff --cached --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"

          git push
