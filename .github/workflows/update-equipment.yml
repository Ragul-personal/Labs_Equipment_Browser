name: Update Equipment Browser

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

jobs:
  update-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas openpyxl

      # ─────────────────────────────────────────────────────────────────────
      # Secret: ONEDRIVE_EXCEL_LINK
      # Value : Share link of the EXCEL FILE (not the folder)
      #         e.g.  https://1drv.ms/x/c/69b69245da1a153e/Exxxxxx
      #
      # OneDrive upload rule: NEVER delete the old file.
      #   Upload new file with the SAME filename → click "Replace"
      #   This keeps the file ID and this link valid forever.
      # ─────────────────────────────────────────────────────────────────────
      - name: Download Excel from OneDrive
        run: |
          curl -L \
            "${{ secrets.ONEDRIVE_EXCEL_URL }}?download=1" \
            -o "IIT-M_L&E_Web&Visit_Data_OG.xlsx"

          # Sanity check: must be a real xlsx, not an HTML error page
          FILE_SIZE=$(stat -c%s "IIT-M_L&E_Web&Visit_Data_OG.xlsx")
          echo "Downloaded file size: ${FILE_SIZE} bytes"

          if [ "$FILE_SIZE" -lt 5000 ]; then
            echo "ERROR: File is too small to be a valid Excel file."
            echo "       Check that ONEDRIVE_EXCEL_URL is a file share link"
            echo "       (starts with 1drv.ms/x/...) and the file is shared"
            echo "       as 'Anyone with the link can view'."
            exit 1
          fi

      - name: Verify Excel
        run: ls -lh "IIT-M_L&E_Web&Visit_Data_OG.xlsx"

      - name: Generate HTML
        run: python regenerate_browser.py

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
