name: Update Equipment Browser

on:
  schedule:
    - cron: "7 0 * * *"        # Runs every day at 00:07 UTC
  workflow_dispatch:             # Allows manual trigger from GitHub UI
    inputs:
      debug_mode:
        description: "Enable verbose curl output for debugging"
        required: false
        default: "false"

jobs:
  update-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write            # Needed to commit back to repo

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python + pip cache ─────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Heartbeat log ──────────────────────────────────────────────────────
      - name: Cron heartbeat log
        run: |
          echo "Workflow executed at:"
          date -u

      # ── 5. Secret guard ───────────────────────────────────────────────────────
      - name: Validate secret is set
        run: |
          if [ -z "${{ secrets.ONEDRIVE_EXCEL_URL }}" ]; then
            echo "::error::Secret ONEDRIVE_EXCEL_URL is empty or not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Secret is present — proceeding."

      # ── 6. Download Excel from OneDrive ──────────────────────────────────────
      # ROOT CAUSE OF 403: SharePoint rejects curl's default User-Agent and
      # unauthenticated requests to personal file URLs.
      #
      # REQUIREMENTS for this to work:
      #   1. The share link MUST have been created as "Anyone with the link"
      #      (not "People in your organisation") — it must contain ?e=XXXXX
      #   2. The URL stored in the secret MUST end with &download=1
      #      i.e.  https://[org]-my.sharepoint.com/...?e=XXXXX&download=1
      #
      # curl flags:
      # --fail            → exit non-zero on HTTP 4xx/5xx
      # --show-error      → print error even with --fail
      # --location        → follow SharePoint's redirect chain
      # --max-time 90     → abort if stalled (SharePoint can be slow)
      # --retry 3         → retry on transient network errors
      # --retry-delay 5   → wait 5 s between retries
      # -H "User-Agent"   → CRITICAL: SharePoint blocks curl's default agent;
      #                     a browser User-Agent is required for anonymous access
      - name: Download latest Excel from OneDrive
        run: |
          CURL_FLAGS="--fail --show-error --location --max-time 90 --retry 3 --retry-delay 5"
          CURL_FLAGS="$CURL_FLAGS -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'"
          CURL_FLAGS="$CURL_FLAGS -H 'Accept: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,*/*'"

          if [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            CURL_FLAGS="$CURL_FLAGS --verbose"
          fi

          eval curl $CURL_FLAGS \
            '"${{ secrets.ONEDRIVE_EXCEL_URL }}"' \
            -o '"IIT-M_L&E_Web&Visit_Data_OG.xlsx"'

      # ── 7. Verify download ────────────────────────────────────────────────────
      - name: Verify Excel downloaded correctly
        run: |
          ls -lh "IIT-M_L&E_Web&Visit_Data_OG.xlsx"
          FILE_TYPE=$(file "IIT-M_L&E_Web&Visit_Data_OG.xlsx")
          echo "$FILE_TYPE"
          if echo "$FILE_TYPE" | grep -qi "html"; then
            echo "::error::Downloaded file is HTML, not Excel."
            echo "This means your share link requires login (HTTP 403/401)."
            echo "Fix: Regenerate the OneDrive share link as 'Anyone with the link'."
            echo "The new URL will contain ?e=XXXXX — save that + &download=1 as your secret."
            exit 1
          fi

      # ── 8. Generate HTML ──────────────────────────────────────────────────────
      - name: Generate HTML
        run: python regenerate_browser.py

      # ── 9. Commit & push ──────────────────────────────────────────────────────
      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
