name: Update Equipment Browser

on:
  schedule:
    - cron: "7 0 * * *"   # Runs every day at 00:07 UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  update-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to commit back to the repo

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pandas openpyxl

      - name: Cron heartbeat log
        run: |
          echo "Workflow executed at:"
          date -u

      # ── ROOT CAUSE FIX ──────────────────────────────────────────────────────
      # OneDrive / SharePoint sharing URLs serve an HTML *preview page* by
      # default.  The old command saved that HTML with a .xlsx extension, which
      # made openpyxl raise  BadZipFile: File is not a zip file.
      #
      # Fix: append  &download=1  (or ?download=1 for URLs with no query
      # string) to instruct the server to return the raw binary instead.
      #
      # Additional hardening:
      #   --retry 3 / --retry-delay 5   automatic back-off on transient errors
      #   --fail-with-body               non-zero exit + body on HTTP 4xx/5xx
      #   --max-redirs 15                follow the full OneDrive redirect chain
      #   -H "User-Agent: …"             some CDN nodes return HTML to unknown UAs
      # ────────────────────────────────────────────────────────────────────────
      - name: Download latest Excel from OneDrive
        run: |
          RAW_URL="${{ secrets.ONEDRIVE_EXCEL_URL }}"

          # Append download=1 unless the secret URL already contains it.
          if [[ "$RAW_URL" == *"download=1"* ]]; then
            DOWNLOAD_URL="$RAW_URL"
          elif [[ "$RAW_URL" == *"?"* ]]; then
            DOWNLOAD_URL="${RAW_URL}&download=1"
          else
            DOWNLOAD_URL="${RAW_URL}?download=1"
          fi

          echo "Resolved download URL (secrets redacted by GitHub):"
          echo "$DOWNLOAD_URL" | sed "s|$RAW_URL|<ONEDRIVE_EXCEL_URL>|"

          curl -L \
            --retry 3 \
            --retry-delay 5 \
            --max-redirs 15 \
            --fail-with-body \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -o "IIT-M_L&E_Web&Visit_Data_OG.xlsx" \
            "$DOWNLOAD_URL"

      # ── GATE: verify the file is a real XLSX before running Python ──────────
      # Checks the ZIP magic bytes (PK\x03\x04) directly in the shell so the
      # workflow fails here with an actionable message rather than inside
      # openpyxl with an opaque BadZipFile traceback.
      # ────────────────────────────────────────────────────────────────────────
      - name: Verify Excel downloaded correctly
        run: |
          FILE="IIT-M_L&E_Web&Visit_Data_OG.xlsx"
          ls -lh "$FILE"

          # Read the first 4 bytes as hex; XLSX/ZIP files start with 504b0304 (PK..)
          MAGIC=$(xxd -p -l 4 "$FILE")
          echo "Magic bytes: $MAGIC"

          if [ "$MAGIC" != "504b0304" ]; then
            echo ""
            echo "ERROR: Downloaded file is NOT a ZIP/XLSX archive (magic=$MAGIC)."
            echo "OneDrive likely returned an HTML page. First 400 bytes of the"
            echo "download (for diagnosis):"
            head -c 400 "$FILE" || true
            echo ""
            echo "SOLUTION: Ensure ONEDRIVE_EXCEL_URL is a direct-download link."
            echo "  Append '&download=1' (or '?download=1') to the URL in GitHub Secrets."
            exit 1
          fi

          echo "Magic bytes OK — ZIP/XLSX structure confirmed."

      - name: Generate HTML
        run: |
          python regenerate_browser.py

      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || \
            git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
