name: Update Equipment Browser

on:
  schedule:
    - cron: "7 0 * * *"        # Runs every day at 00:07 UTC
  workflow_dispatch:             # Allows manual trigger from GitHub UI
    inputs:
      debug_mode:
        description: "Enable verbose curl output for debugging"
        required: false
        default: "false"

jobs:
  update-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write            # Needed to commit back to repo

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python + pip cache ─────────────────────────────────────────────────
      # cache: "pip" reads requirements.txt to build the cache key.
      # Without requirements.txt in the repo this step crashes — that file is
      # now committed alongside this workflow (see /requirements.txt).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt   # explicit path → no scan error

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Heartbeat log ──────────────────────────────────────────────────────
      - name: Cron heartbeat log
        run: |
          echo "Workflow executed at:"
          date -u

      # ── 5. Secret guard ───────────────────────────────────────────────────────
      - name: Validate secret is set
        run: |
          if [ -z "${{ secrets.ONEDRIVE_EXCEL_URL }}" ]; then
            echo "::error::Secret ONEDRIVE_EXCEL_URL is empty or not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Secret is present — proceeding."

      # ── 6. Download Excel from OneDrive ──────────────────────────────────────
      # --fail        → exit non-zero on HTTP 4xx/5xx (catches expired share links)
      # --show-error  → print the HTTP error even with --fail
      # --location    → follow redirects (OneDrive always redirects)
      # --max-time 60 → abort if the download stalls for >60 s
      # --retry 3     → retry up to 3 times on transient network errors
      - name: Download latest Excel from OneDrive
        run: |
          CURL_FLAGS="--fail --show-error --location --max-time 60 --retry 3"
          if [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            CURL_FLAGS="$CURL_FLAGS --verbose"
          fi
          curl $CURL_FLAGS \
            "${{ secrets.ONEDRIVE_EXCEL_URL }}" \
            -o "IIT-M_L&E_Web&Visit_Data_OG.xlsx"

      # ── 7. Verify download ────────────────────────────────────────────────────
      # If OneDrive returned an HTML error page, `file` reports "HTML document"
      # instead of an Office Open XML type — we catch that and abort cleanly.
      - name: Verify Excel downloaded correctly
        run: |
          ls -lh "IIT-M_L&E_Web&Visit_Data_OG.xlsx"
          FILE_TYPE=$(file "IIT-M_L&E_Web&Visit_Data_OG.xlsx")
          echo "$FILE_TYPE"
          if echo "$FILE_TYPE" | grep -qi "html"; then
            echo "::error::Downloaded file is HTML, not Excel."
            echo "Your OneDrive share link likely expired or requires login."
            echo "Regenerate the link and update the ONEDRIVE_EXCEL_URL secret."
            exit 1
          fi

      # ── 8. Generate HTML ──────────────────────────────────────────────────────
      - name: Generate HTML
        run: python regenerate_browser.py

      # ── 9. Commit & push ──────────────────────────────────────────────────────
      - name: Commit updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
