name: Update Equipment Browser

on:
  schedule:
    - cron: "7 0 * * *"
  workflow_dispatch:

jobs:
  update-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas openpyxl

      # ─────────────────────────────────────────────────────────────────────
      # IMPORTANT: Your GitHub secret must be named ONEDRIVE_FOLDER_LINK
      # Value  : the raw share link, e.g.  https://1drv.ms/f/c/xxxxxxxx
      # The folder MUST be shared as "Anyone with the link can view"
      # ─────────────────────────────────────────────────────────────────────
      - name: Download Excel from OneDrive Shared Folder
        env:
          ONEDRIVE_FOLDER_LINK: ${{ secrets.ONEDRIVE_EXCEL_URL }}
        run: |
          python3 - << 'PYEOF'
          import base64, json, os, sys, urllib.error, urllib.request

          # ── 1. Read and encode the share link ──────────────────────────
          folder_url = os.environ.get("ONEDRIVE_FOLDER_LINK", "").strip()
          if not folder_url:
              print("ERROR: ONEDRIVE_FOLDER_LINK secret is empty or missing.")
              sys.exit(1)

          print(f"Share link prefix: {folder_url[:40]}...")

          encoded  = base64.urlsafe_b64encode(folder_url.encode()).decode().rstrip("=")
          share_id = "u!" + encoded
          print(f"Encoded share-id: {share_id[:30]}...")

          # ── 2. Query Graph API (preferred) ─────────────────────────────
          graph_url  = f"https://graph.microsoft.com/v1.0/shares/{share_id}/root/children"
          legacy_url = f"https://api.onedrive.com/v1.0/shares/{share_id}/root/children"

          data = None
          for label, url in [("Graph API", graph_url), ("Legacy API", legacy_url)]:
              try:
                  print(f"Trying {label}: {url}")
                  req = urllib.request.Request(url, headers={"Accept": "application/json"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read())
                  print(f"{label}: OK ({len(data.get('value', []))} items found)")
                  break
              except urllib.error.HTTPError as e:
                  body = e.read().decode(errors="replace")
                  print(f"{label} failed [{e.code}]: {body[:300]}")
              except Exception as e:
                  print(f"{label} error: {e}")

          if data is None:
              print("ERROR: Both API endpoints failed.")
              print("ACTION REQUIRED: Make sure the folder is shared as")
              print("  'Anyone with the link can view'  (not org-only).")
              sys.exit(1)

          # ── 3. Find .xlsx and get its download URL ─────────────────────
          items = data.get("value", [])
          print(f"Files in folder: {[i['name'] for i in items]}")

          download_url = None
          found_name   = None
          for item in items:
              if item["name"].endswith(".xlsx"):
                  # Graph API uses @microsoft.graph.downloadUrl
                  # Legacy API uses @content.downloadUrl
                  download_url = (
                      item.get("@microsoft.graph.downloadUrl")
                      or item.get("@content.downloadUrl")
                  )
                  found_name = item["name"]
                  break

          if not download_url:
              print("ERROR: No .xlsx file found in the shared folder.")
              sys.exit(1)

          print(f"Downloading: {found_name}")

          # ── 4. Download and save with the fixed internal name ──────────
          output = "IIT-M_L&E_Web&Visit_Data_OG.xlsx"
          urllib.request.urlretrieve(download_url, output)

          size = os.path.getsize(output)
          print(f"Saved as '{output}'  ({size / 1024:.1f} KB)")

          if size < 1024:
              print("WARNING: File is very small — may be an error page, not Excel.")
              sys.exit(1)
          PYEOF

      - name: Verify Excel
        run: ls -lh "IIT-M_L&E_Web&Visit_Data_OG.xlsx"

      - name: Generate HTML
        run: python regenerate_browser.py

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
